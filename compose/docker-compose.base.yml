version: "3.8"

x-app:
  &default-app
  volumes:
    - /mnt:/mnt
  depends_on:
    - postgres
    - rabbit
    - redis
  environment:
    USE_DOCKER: 1
    DATABASE_URL: "psql://postgres:postgres@postgres:5432/postgres"
    RABBITMQ_URL: "amqp://rabbit"
    REDIS_URL: "redis://redis:6379/0"
    DJANGO_STATIC_ROOT: "/var/www/radis/static/"
    RABBIT_MANAGEMENT_HOST: "rabbit"
    RABBIT_MANAGEMENT_PORT: "15672"
    FLOWER_HOST: "flower"
    FLOWER_PORT: "5555"
    VESPA_HOST: "vespa"
    VESPA_PORT: "19071"

services:
  web:
    <<: *default-app
    build:
      context: ..
    volumes:
      # Cave, overwrites the above anchor
      - /mnt:/mnt
      - radis_data:/var/www/radis

  worker_default:
    <<: *default-app

  worker_report:
    <<: *default-app

  celery_beat:
    <<: *default-app

  flower:
    <<: *default-app
    expose:
      - "5555"
    command: >
      bash -c "
        wait-for-it -s rabbit:5672 -t 60 &&
        celery --broker=amqp://rabbit/ flower --url_prefix=flower
      "

  postgres:
    image: postgres:13.1
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # RabbitMQ authentication can't be disabled. So when we try to log into
  # the management console we have to use "guest" as username and password.
  # The real authentication happens by RADIS itself, because the management
  # console is behind a ProxyView.
  rabbit:
    image: rabbitmq:3.8-management
    expose:
      - "5672"
      - "15672"
    volumes:
      - rabbit_data:/var/lib/rabbitmq

  redis:
    image: redis:6.0
    expose:
      - "6379"
    volumes:
      - redis_data:/data

  vespa:
    image: vespaengine/vespa
    healthcheck:
      test: curl http://localhost:19071/state/v1/health
      timeout: 10s
      retries: 3
      start_period: 40s
    ports:
      - 19071:19071
      - 19100:19100
      - 19050:19050
      - 20092:19092

volumes:
  radis_data:
  postgres_data:
  rabbit_data:
  redis_data:
  flower_data:
