{% load url_abbreviation from core_extras %}
<div class="d-flex justify-content-between">
    <div class="d-flex gap-1">
        <a href="{% url 'report_detail' report.doc_id %}"
           class="btn btn-light btn-sm">
            {% include "core/icons/goto.svg" %}
            View
        </a>
        <button hx-get="{% url 'preview' report.doc_id %}"
                hx-target="#dialog"
                class="btn btn-light btn-sm">
            {% include "core/icons/preview.svg" %}
            Preview
        </button>
        <div class="btn-group" role="group" aria-label="Collection actions">
            <a href="{% url 'report_detail' report.doc_id %}"
               class="btn btn-light btn-sm">
                {% include "core/icons/add.svg" %}
                Collection
            </a>
            <a href="{% url 'report_detail' report.doc_id %}"
               class="btn btn-light btn-sm">{% include "core/icons/more.svg" %}</a>
        </div>
    </div>
    <div class="d-flex gap-1">
        {% for reference in report.references %}
            <a href="{{ reference }}"
               target="_blank"
               rel="noopener noreferrer"
               class="btn btn-light btn-sm">
                {% url_abbreviation reference %}
                {% include "core/icons/link.svg" %}
            </a>
        {% endfor %}
    </div>
</div>
