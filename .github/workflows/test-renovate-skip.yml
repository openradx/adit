name: Test Renovate Skip Condition

on:
  push:
    branches:
      - skip-claude-review-for-renovate

env:
  # Simulated actors to test
  RENOVATE_BOT: 'renovate[bot]'
  REGULAR_USER: 'some-user'

jobs:
  # This job simulates what happens for renovate[bot] - should be SKIPPED
  test-renovate-skipped:
    if: ${{ 'renovate[bot]' != 'renovate[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - run: echo "ERROR - This should not run"

  # This job simulates what happens for a regular user - should RUN
  test-regular-user-runs:
    if: ${{ 'some-user' != 'renovate[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - run: echo "SUCCESS - Regular user job runs correctly"

  report-results:
    runs-on: ubuntu-latest
    needs: [test-renovate-skipped, test-regular-user-runs]
    if: always()
    steps:
      - run: |
          echo "=== Test Results ==="
          echo "test-renovate-skipped: ${{ needs.test-renovate-skipped.result }}"
          echo "test-regular-user-runs: ${{ needs.test-regular-user-runs.result }}"
          echo ""
          if [ "${{ needs.test-renovate-skipped.result }}" == "skipped" ] && [ "${{ needs.test-regular-user-runs.result }}" == "success" ]; then
            echo "ALL TESTS PASSED"
            echo "- renovate[bot] correctly skipped"
            echo "- regular user correctly ran"
          else
            echo "TEST FAILED"
            exit 1
          fi
